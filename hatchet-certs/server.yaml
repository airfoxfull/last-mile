additionalLoggers:
  pgxStats:
    format: console
    level: warn
  queue:
    format: console
    level: warn
alerting:
  sentry:
    environment: development
    sampleRate: 1
analytics:
  aggregateFlushInterval: 60m
  aggregateMaxKeys: 500
  posthog: {}
auth:
  basicAuthEnabled: true
  cookie:
    domain: localhost
    insecure: true
    name: hatchet
    secrets: prABJcflGQsdxFaK HJYZT6v0BlBSHglW
  github:
    scopes:
    - read:user
    - user:email
  google:
    scopes:
    - openid
    - profile
    - email
cronOperations:
  dbHealthMetricsInterval: 60000000000
  olapAnalyzeCronInterval: 10800000000000
  olapMetricsInterval: 300000000000
  taskAnalyzeCronInterval: 10800000000000
  workerMetricsInterval: 60000000000
  yesterdayRunCountMinute: 5
email:
  kind: postmark
  postmark:
    fromName: Hatchet Support
  smtp:
    basicAuth: {}
    fromName: Hatchet Support
enableDataRetention: true
encryption:
  cloudKMS: {}
  jwt:
    privateJWTKeyset: 
    publicJWTKeyset: 
  masterKeyset: 
internalClient:
  base:
    tlsStrategy: tls
  inheritBase: true
logger:
  format: console
  level: warn
monitoring:
  enabled: true
  permittedTenants: null
  probeTimeout: 30000000000
msgQueue:
  enabled: true
  kind: rabbitmq
  postgres:
    qos: 100
  rabbitmq:
    compressionThreshold: 5120
    maxDeathCount: 5
    maxPubChans: 20
    maxSubChans: 100
    qos: 100
observability:
  maxBatchSize: 1000
olap:
  pollInterval: 2
otel:
  serviceName: server
  traceIdRatio: "1"
payloadStore:
  enableDagDataPayloadDualWrites: true
  enableOLAPPayloadDualWrites: true
  enablePayloadDualWrites: true
  enableTaskEventPayloadDualWrites: true
  externalCutoverBatchSize: 1000
  externalCutoverNumConcurrentOffloads: 10
  externalCutoverProcessInterval: 15000000000
  inlineStoreTTLDays: 2
prometheus:
  address: :9090
  path: /metrics
pylon: {}
runtime:
  allowChangePassword: true
  allowCreateTenant: true
  allowInvites: true
  allowSignup: true
  apiRateLimit: 10
  apiRateLimitWindow: 300000000000
  defaultEngineVersion: V1
  flushItemsThreshold: 100
  flushPeriodMilliseconds: 10
  grpcBindAddress: 0.0.0.0
  grpcBroadcastAddress: localhost:7077
  grpcMaxMsgSize: 4194304
  grpcPort: 7070
  grpcRateLimit: 1000
  grpcStaticStreamWindowSize: 10485760
  grpcTriggerWriteSlots: 5
  grpcTriggerWritesEnabled: true
  grpcWorkerMaxLockAcquisitionTime: 250000000
  healthcheck: true
  healthcheckPort: 8733
  limits:
    defaultCronAlarmLimit: 2
    defaultCronLimit: 5
    defaultEventAlarmLimit: 800
    defaultEventLimit: 1000
    defaultEventWindow: 86400000000000
    defaultIncomingWebhookALarmLimit: 4
    defaultIncomingWebhookLimit: 5
    defaultScheduleAlarmLimit: 750
    defaultScheduleLimit: 1000
    defaultTaskRunAlarmLimit: 1600
    defaultTaskRunLimit: 2000
    defaultTaskRunWindow: 86400000000000
    defaultTenantRetentionPeriod: 720h
    defaultWorkerAlarmLimit: 2
    defaultWorkerLimit: 3
    defaultWorkerSlotAlarmLimit: 1600
    defaultWorkerSlotLimit: 2000
    defaultWorkflowRunAlarmLimit: 1600
    defaultWorkflowRunLimit: 2000
    defaultWorkflowRunWindow: 86400000000000
  logIngestionEnabled: true
  maxConcurrent: 50
  maxInternalRetryCount: 10
  maxPendingInvites: 100
  monitoring:
    enabled: true
    permittedTenants: null
    probeTimeout: 30000000000
  optimisticSchedulingEnabled: true
  optimisticSchedulingSlots: 5
  port: 8080
  replayEnabled: true
  requeueLimit: 100
  schedulerConcurrencyPollingMaxInterval: 5000000000
  schedulerConcurrencyPollingMinInterval: 500000000
  schedulerConcurrencyRateLimit: 20
  singleQueueLimit: 100
  streamEventBufferTimeout: 5000000000
  taskOperationLimits:
    durableSleepLimit: 1000
    reassignLimit: 1000
    retryQueueLimit: 1000
    timeoutLimit: 1000
  updateConcurrentFactor: 10
  updateHashFactor: 100
  url: http://localhost:8888
  waitForFlush: 1
  workflowRunBufferSize: 1000
sampling:
  samplingRate: 1
securityCheck:
  enabled: true
  endpoint: https://security.hatchet.run
services:
- all
statusUpdates:
  dagBatchSizeLimit: 1000
  taskBatchSizeLimit: 1000
tenantAlerting:
  slack:
    scopes:
    - incoming-webhook
tls:
  tlsStrategy: tls
